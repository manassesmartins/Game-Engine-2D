<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1F26"/>
      <stop offset="50%" stop-color="#2B2C33"/>
      <stop offset="100%" stop-color="#1E1F26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="canvasBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23242B"/>
      <stop offset="100%" stop-color="#1A1B22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.04">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FFA000" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#grid)"/>
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#2B2C33" opacity="0.8"/>
  <rect x="0" y="48" width="1200" height="1" fill="#3A3B44"/>
  <circle cx="24" cy="24" r="10" fill="#FFA000"/>
  <text x="42" y="28" fill="#E0E0E0" font-size="12" font-family="monospace" font-weight="bold">Lume Studio</text>

  <!-- Sidebar -->
  <rect x="0" y="49" width="52" height="251" fill="#2B2C33" opacity="0.8"/>
  <rect x="52" y="49" width="1" height="251" fill="#3A3B44"/>

  <!-- Sidebar icons -->
  <g transform="translate(16, 72)">
    <rect width="20" height="20" rx="4" fill="#FFA000"/>
    <text x="10" y="14" fill="#fff" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">C</text>
  </g>
  <g transform="translate(16, 102)">
    <rect width="20" height="20" rx="4" fill="#3A3B44"/>
    <text x="10" y="14" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">E</text>
  </g>
  <g transform="translate(16, 132)">
    <rect width="20" height="20" rx="4" fill="#3A3B44"/>
    <text x="10" y="14" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">P</text>
  </g>
  <g transform="translate(16, 162)">
    <rect width="20" height="20" rx="4" fill="#3A3B44"/>
    <text x="10" y="14" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">A</text>
  </g>
  <g transform="translate(16, 192)">
    <rect width="20" height="20" rx="4" fill="#3A3B44"/>
    <text x="10" y="14" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">L</text>
  </g>
  <g transform="translate(16, 222)">
    <rect width="20" height="20" rx="4" fill="#3A3B44"/>
    <text x="10" y="14" fill="#888" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">Ex</text>
  </g>

  <!-- Canvas area -->
  <rect x="70" y="62" width="760" height="226" fill="url(#canvasBg)" rx="6" stroke="#3A3B44" stroke-width="1" filter="url(#shadow)"/>

  <!-- Canvas content: game scene mockup -->
  <g transform="translate(85, 77)">
    <rect width="730" height="196" fill="#1E1F26" rx="4"/>

    <!-- Sky gradient -->
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2a1e45"/>
        <stop offset="100%" stop-color="#1a1a2e"/>
      </linearGradient>
    </defs>
    <rect width="730" height="140" fill="url(#sky)" rx="4"/>

    <!-- Stars -->
    <circle cx="50" cy="20" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="150" cy="35" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="300" cy="15" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="450" cy="40" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="600" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="700" cy="30" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="200" cy="50" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="550" cy="10" r="1.5" fill="#fff" opacity="0.8"/>

    <!-- Moon -->
    <circle cx="620" cy="40" r="18" fill="#FFD700" opacity="0.3"/>
    <circle cx="620" cy="40" r="14" fill="#FFD700" opacity="0.5"/>
    <circle cx="618" cy="38" r="12" fill="#FFD700" opacity="0.2"/>

    <!-- Ground / tilemap rows -->
    <rect x="0" y="140" width="730" height="8" fill="#4CAF50"/>
    <rect x="0" y="148" width="730" height="8" fill="#388E3C"/>
    <rect x="0" y="156" width="730" height="8" fill="#2E7D32"/>
    <rect x="0" y="164" width="730" height="8" fill="#1B5E20"/>
    <rect x="0" y="172" width="730" height="24" fill="#795548"/>

    <!-- Platform -->
    <rect x="200" y="110" width="120" height="10" rx="2" fill="#8B4513"/>
    <rect x="200" y="110" width="120" height="3" fill="#A0522D"/>
    <rect x="420" y="90" width="100" height="10" rx="2" fill="#8B4513"/>
    <rect x="420" y="90" width="100" height="3" fill="#A0522D"/>

    <!-- Player character (small pixel avatar) -->
    <g transform="translate(300, 92)">
      <rect x="4" y="0" width="8" height="4" rx="1" fill="#3b82f6"/>
      <rect x="2" y="4" width="12" height="8" rx="1" fill="#3b82f6"/>
      <rect x="4" y="6" width="2" height="2" fill="#fff"/>
      <rect x="10" y="6" width="2" height="2" fill="#fff"/>
      <rect x="2" y="12" width="12" height="8" rx="1" fill="#2563eb"/>
      <rect x="0" y="20" width="4" height="6" fill="#1d4ed8"/>
      <rect x="12" y="20" width="4" height="6" fill="#1d4ed8"/>
    </g>

    <!-- Enemy -->
    <g transform="translate(470, 64)">
      <rect x="2" y="0" width="12" height="4" rx="1" fill="#a855f7"/>
      <rect x="0" y="4" width="16" height="10" rx="1" fill="#a855f7"/>
      <rect x="3" y="6" width="2" height="2" fill="#ff0000"/>
      <rect x="11" y="6" width="2" height="2" fill="#ff0000"/>
      <rect x="0" y="14" width="16" height="6" rx="1" fill="#9333ea"/>
      <rect x="2" y="20" width="4" height="4" fill="#7e22ce"/>
      <rect x="10" y="20" width="4" height="4" fill="#7e22ce"/>
    </g>

    <!-- Coin -->
    <g transform="translate(380, 82)">
      <circle cx="6" cy="6" r="6" fill="#eab308"/>
      <circle cx="6" cy="6" r="4" fill="#facc15"/>
      <text x="6" y="9" fill="#eab308" font-size="6" font-family="sans-serif" text-anchor="middle" font-weight="bold">C</text>
    </g>

    <!-- ScrollTo indicator -->
    <line x1="325" y1="40" x2="325" y2="140" stroke="#FFA000" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <polygon points="325,38 322,46 328,46" fill="#FFA000" opacity="0.6"/>
  </g>

  <!-- Right panel: Object Types -->
  <rect x="848" y="62" width="336" height="110" fill="#26272E" rx="6" stroke="#3A3B44" stroke-width="1"/>
  <rect x="848" y="62" width="336" height="24" fill="#2B2C33" rx="6"/>
  <rect x="848" y="80" width="336" height="1" fill="#3A3B44"/>
  <text x="856" y="78" fill="#E0E0E0" font-size="8" font-family="monospace" font-weight="bold" letter-spacing="1">OBJECT TYPES</text>

  <!-- Small object type icons -->
  <g transform="translate(858, 94)">
    <rect width="28" height="28" rx="4" fill="#3A3B44" stroke="#FFA000" stroke-width="1"/>
    <rect x="4" y="4" width="8" height="6" rx="1" fill="#3b82f6"/>
    <rect x="2" y="10" width="12" height="8" rx="1" fill="#3b82f6"/>
    <rect x="2" y="18" width="4" height="6" fill="#1d4ed8"/>
    <rect x="10" y="18" width="4" height="6" fill="#1d4ed8"/>
    <text x="14" y="36" fill="#888" font-size="6" font-family="sans-serif" text-anchor="middle">Jogador</text>
  </g>
  <g transform="translate(894, 94)">
    <rect width="28" height="28" rx="4" fill="#2B2C33"/>
    <circle cx="14" cy="14" r="5" fill="#eab308"/>
    <circle cx="14" cy="14" r="3" fill="#facc15"/>
    <text x="14" y="36" fill="#888" font-size="6" font-family="sans-serif" text-anchor="middle">Moeda</text>
  </g>
  <g transform="translate(930, 94)">
    <rect width="28" height="28" rx="4" fill="#2B2C33"/>
    <rect x="6" y="4" width="12" height="6" rx="1" fill="#a855f7"/>
    <rect x="4" y="10" width="16" height="8" rx="1" fill="#a855f7"/>
    <rect x="6" y="18" width="4" height="6" fill="#7e22ce"/>
    <rect x="14" y="18" width="4" height="6" fill="#7e22ce"/>
    <text x="14" y="36" fill="#888" font-size="6" font-family="sans-serif" text-anchor="middle">Inimigo</text>
  </g>

  <!-- Right panel: Layers -->
  <rect x="848" y="180" width="336" height="108" fill="#26272E" rx="6" stroke="#3A3B44" stroke-width="1"/>
  <rect x="848" y="180" width="336" height="24" fill="#2B2C33" rx="6"/>
  <rect x="848" y="198" width="336" height="1" fill="#3A3B44"/>
  <text x="856" y="196" fill="#E0E0E0" font-size="8" font-family="monospace" font-weight="bold" letter-spacing="1">LAYERS</text>

  <!-- Layer items -->
  <rect x="858" y="208" width="316" height="22" rx="3" fill="#3A3B44" stroke="#FFA000" stroke-width="0.5"/>
  <circle cx="866" cy="219" r="4" fill="#FFA000"/>
  <text x="876" y="222" fill="#E0E0E0" font-size="8" font-family="monospace">Main (Jogo)</text>
  <rect x="1150" y="210" width="18" height="18" rx="3" fill="#FFA000"/>
  <text x="1159" y="223" fill="#fff" font-size="7" font-family="monospace" font-weight="bold">Sel</text>

  <rect x="858" y="234" width="316" height="22" rx="3" fill="#2B2C33"/>
  <circle cx="866" cy="245" r="4" fill="#4A4B54"/>
  <text x="876" y="248" fill="#888" font-size="8" font-family="monospace">Background (Parallax)</text>

  <rect x="858" y="260" width="316" height="22" rx="3" fill="#2B2C33"/>
  <circle cx="866" cy="271" r="4" fill="#4A4B54"/>
  <text x="876" y="274" fill="#888" font-size="8" font-family="monospace">UI / HUD</text>

  <!-- Title overlay -->
  <g transform="translate(450, 68)">
    <text x="0" y="0" fill="#FFA000" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">Lume</text>
    <text x="160" y="0" fill="#E0E0E0" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">Studio</text>
    <text x="0" y="20" fill="#888" font-size="10" font-family="monospace">Game Engine 2D · No-code · Visual</text>

    <!-- Version badge -->
    <rect x="0" y="28" width="60" height="14" rx="7" fill="#FFA000" opacity="0.2"/>
    <text x="30" y="39" fill="#FFA000" font-size="7" font-family="monospace" font-weight="bold" text-anchor="middle">v0.1.0</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Decorative corner accents -->
  <rect x="0" y="0" width="4" height="4" fill="#FFA000"/>
  <rect x="1196" y="0" width="4" height="4" fill="#FFA000"/>
</svg>
